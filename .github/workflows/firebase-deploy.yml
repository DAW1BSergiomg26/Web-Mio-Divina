name: Despliegue Continuo a Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt || echo "No requirements.txt, skipping"

      - name: 🧪 Run Tests
        run: |
          npm install
          node tests/run.js

      - name: 🔍 Lighthouse Audit
        uses: foo-software/lighthouse-check-action@master
        with:
          urls: 'http://localhost:3002'
        continue-on-error: true

  build_and_deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install Pillow python-dotenv
          npm install

      - name: ⚙️ Build Production
        run: |
          npm run build:sitemap
          npm run build:css
          npm run build:js
        env:
          NODE_ENV: production

      - name: 🚀 Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIVINA_MISERICORDIA }}'
          channelId: live
          projectId: divina-misericordia-web
        env:
          FIREBASE_TOKEN: '${{ secrets.FIREBASE_TOKEN }}'
