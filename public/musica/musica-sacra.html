<!DOCTYPE html>

<html lang="es-ES">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Música Sacra - Biblioteca de la Divina Misericordia</title>
<link href="css/audio-player.css" rel="stylesheet"/>
<link href="musica-sacra.css" rel="stylesheet"/>
<meta content="Portal oficial sobre musica sacra. Divina Misericordia, Jesús en vos confío." name="description"/></head>
<body>
<div class="bg"></div>
<div class="music-notes-bg"></div>
<main id="ms-container">
<header class="ms-header">
<h1>Música Sacra</h1>
<p class="subtitle">Biblioteca de música para la oración</p>
</header>
<section aria-label="Búsqueda" class="ms-search">
<input aria-label="Buscar en la biblioteca" autocomplete="off" id="ms-search-input" placeholder="Buscar himno o canción..." type="search"/>
</section>
<section aria-label="Resultados" class="ms-results">
<p class="hidden" id="ms-empty">No se encontraron resultados</p>
<ul id="ms-track-list" role="listbox"></ul>
<div id="ms-scroll-sentinel"></div>
</section>
</main>
<footer aria-label="Reproductor" class="player-bar" id="ms-player-bar">
<span class="track-title" id="ms-track-title"></span>
<div aria-label="Progreso" class="progress-bar" id="ms-progress-bar" role="slider">
<div class="progress-fill" id="ms-progress-fill"></div>
</div>
<span class="time" id="ms-current-time">0:00</span>
<span class="time" id="ms-duration">0:00</span>
<div class="controls">
<button aria-label="Anterior" id="ms-prev-btn">⏮</button>
<button aria-label="Reproducir" id="ms-play-btn">▶</button>
<button aria-label="Detener" id="ms-stop-btn">⏹</button>
<button aria-label="Siguiente" id="ms-next-btn">⏭</button>
</div>
</footer>
<script defer="" src="assets/js/audio-catalog.js"></script>
<script defer="" src="assets/js/audio-player.js"></script>
<script defer="" src="musica-sacra.js"></script>
</body>
</html>
