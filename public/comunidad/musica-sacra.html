<!DOCTYPE html>

<html lang="es-ES">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Música Sacra | Biblioteca de Música Divina</title>
<link href="css/global.css" rel="stylesheet"/>
<link href="musica-sacra.css" rel="stylesheet"/>
<meta content="Portal oficial sobre musica sacra. Divina Misericordia, Jesús en vos confío." name="description"/>
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Track devociones
      document.querySelectorAll('a[href*="coronilla"]').forEach(l => 
        l.addEventListener('click', () => gtag && gtag('event', 'iniciar_coronilla', { event_category: 'Devocion' })));
      document.querySelectorAll('a[href*="novena"]').forEach(l => 
        l.addEventListener('click', () => gtag && gtag('event', 'iniciar_novena', { event_category: 'Devocion' })));
      document.querySelectorAll('audio, .play-btn').forEach(l => 
        l.addEventListener('play', () => gtag && gtag('event', 'play_audio', { event_category: 'Multimedia' })));
    });
  </script></head>
<body>
<main class="sacred-library">
<header class="library-header">
<h1>Biblioteca de Música Sacra</h1>
<p>Selección curada para la oración y el encuentro con lo Divino.</p>
</header>
<section class="search-section">
<input class="search-bar" id="search-input" placeholder="Buscar por título o artista..." type="text"/>
</section>
<nav class="filter-nav" id="filter-nav">
<!-- Categorías inyectadas por JS -->
</nav>
<section class="tracks-grid" id="tracks-container">
<!-- Pistas inyectadas por JS -->
</section>
</main>
<!-- Dependencias globales -->
<script src="assets/js/audio-catalog.js"></script>
<script src="assets/js/event-bus.js"></script>
<script src="musica-sacra.js"></script>

  <!-- Core Web Vitals -->
  <script src="/assets/js/web-vitals.js"></script></body>
</html>
