<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Buscador de Oraciones - Divina Misericordia</title>
<link href="../assets/css/global.css" rel="stylesheet"/>
<link href="../assets/css/styles.css" rel="stylesheet"/>
<link href="../assets/css/sacred-components.css" rel="stylesheet"/>
<meta content="Portal oficial sobre buscador. Divina Misericordia, Jesús en vos confío." name="description"/>
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Track devociones
      document.querySelectorAll('a[href*="coronilla"]').forEach(l => 
        l.addEventListener('click', () => gtag && gtag('event', 'iniciar_coronilla', { event_category: 'Devocion' })));
      document.querySelectorAll('a[href*="novena"]').forEach(l => 
        l.addEventListener('click', () => gtag && gtag('event', 'iniciar_novena', { event_category: 'Devocion' })));
      document.querySelectorAll('audio, .play-btn').forEach(l => 
        l.addEventListener('play', () => gtag && gtag('event', 'play_audio', { event_category: 'Multimedia' })));
    });
  </script></head>
<body class="sacred-theme">
<div class="container">
<header style="text-align: center; padding: 40px 0;">
<h1 class="gold-text">Buscador de Oraciones</h1>
<p>Encuentra la palabra de Dios y el consuelo de los Santos</p>
</header>
<div class="search-container">
<input id="prayer-search-input" placeholder="Ej: Coronilla, San Benito, Protección..." type="text"/>
<div class="search-results" id="search-results">
<!-- Se llena dinámicamente -->
</div>
</div>
<footer class="sacred-footer" style="text-align: center; margin-top: 50px;">
<a class="btn-sacred" href="../index.html">Volver al Altar</a>
</footer>
</div>
<script src="../assets/js/search-engine.js"></script>

  <!-- Core Web Vitals -->
  <script src="/assets/js/web-vitals.js"></script></body>
</html>
