<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario de Reflexión - Divina Misericordia</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/sacred-components.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body class="sacred-theme">
    <div class="container">
        <header style="text-align: center; padding: 20px 0;">
            <h1 class="gold-text">Mi Diario Espiritual</h1>
            <p>Un espacio íntimo para tus diálogos con Jesús</p>
        </header>

        <div class="journal-container">
            <div class="journal-header">
                <span>Fecha: <span id="current-date"></span></span>
                <span id="save-status" style="font-style: italic; opacity: 0.7;">Santuario en Silencio</span>
            </div>
            <textarea id="journal-editor" placeholder="Escribe aquí tus reflexiones, gracias recibidas o propósitos de hoy..."></textarea>
            
            <div class="journal-controls">
                <button id="export-txt" class="btn-sacred">Guardar en PC (.txt)</button>
                <button onclick="localStorage.removeItem('spiritual_journal'); location.reload();" class="btn-sacred" style="background: #8b0000; color: white;">Limpiar Diario</button>
            </div>
        </div>

        <footer style="text-align: center; margin-top: 30px;">
            <a href="../index.html" class="btn-sacred">Volver al Altar</a>
        </footer>
    </div>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString();
    </script>
    <script src="../assets/js/journal-pro.js"></script>
</body>
</html>
