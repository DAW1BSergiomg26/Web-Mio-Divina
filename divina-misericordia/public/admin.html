<!DOCTYPE html>
<html lang="es-ES">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración - Divina Misericordia</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4af37;--gold-light:#f4e2a1;--gold-dark:#b8960c;--blue-deep:#050d1a;--white:#faf7f0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--blue-deep);color:var(--white);font-family:'EB Garamond',Georgia,serif;min-height:100vh;display:flex;justify-content:center;align-items:center}
.login-container{width:100%;max-width:400px;padding:20px}
.login-box{background:rgba(0,0,0,0.8);border:2px solid var(--gold);border-radius:20px;padding:40px;text-align:center;box-shadow:0 0 30px rgba(212,175,55,0.3)}
.login-box h1{font-family:'Cinzel Decorative';color:var(--gold-light);margin-bottom:30px;font-size:1.8rem;text-shadow:0 0 20px rgba(212,175,55,0.5)}
.login-box input{width:100%;padding:15px;margin:15px 0;border-radius:10px;border:1px solid rgba(212,175,55,0.5);background:rgba(255,255,255,0.1);color:#fff;font-size:1rem}
.login-box input::placeholder{color:rgba(255,255,255,0.5)}
.login-box button{width:100%;padding:15px;margin-top:20px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--blue-deep);font-family:Cinzel;font-weight:bold;font-size:1.1rem;cursor:pointer;transition:all 0.3s}
.login-box button:hover{transform:scale(1.02);box-shadow:0 0 25px rgba(212,175,55,0.6)}
.error{color:#ff4444;margin-top:15px;display:none;font-size:0.9rem}
.cursor-cruz{position:fixed;pointer-events:none;z-index:9999;font-size:2rem;color:var(--gold);text-shadow:0 0 10px var(--gold),0 0 20px var(--gold);transition:transform 0.15s ease,color 0.2s ease,text-shadow 0.2s ease}
.cursor-cruz.hover{color:#ff4444;text-shadow:0 0 15px #ff4444,0 0 30px #ff0000;transform:scale(1.3)}

/* Cursor cruz profesional con efecto rayos */
.cursor-cruz {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    width: 38px;
    height: 38px;
    transition: transform 0.15s ease, filter 0.25s ease;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
}
.cursor-cruz svg {
    width: 100%;
    height: 100%;
}
.cursor-cruz .cruz-normal {
    transition: opacity 0.2s ease;
}
.cursor-cruz .cruz-rayos {
    opacity: 0;
    transition: opacity 0.25s ease;
}
.cursor-cruz.hover {
    transform: translate(-50%, -50%) scale(1.6);
    filter: drop-shadow(0 0 12px rgba(255,80,80,0.9)) drop-shadow(0 0 24px rgba(255,40,40,0.7)) drop-shadow(0 0 36px rgba(80,120,255,0.6));
}
.cursor-cruz.hover .cruz-normal {
    opacity: 0;
}
.cursor-cruz.hover .cruz-rayos {
    opacity: 1;
}


/* Scroll buttons profesionales con brillo */
.scroll-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    animation: scrollPulse 2s ease-in-out infinite;
    transition: all 0.3s ease;
    position: fixed;
    z-index: 1000;
    backdrop-filter: blur(8px);
}
.scroll-btn:hover {
    background: rgba(212,175,55,0.35);
    box-shadow: 0 0 25px rgba(212,175,55,0.8), 0 0 50px rgba(212,175,55,0.4), 0 0 70px rgba(212,175,55,0.2);
    transform: scale(1.1);
}
.scroll-btn svg {
    width: 24px;
    height: 24px;
    stroke: var(--gold);
    stroke-width: 2.5;
    fill: none;
    filter: drop-shadow(0 0 4px rgba(212,175,55,0.8));
    transition: transform 0.2s ease;
}
.scroll-btn:hover svg {
    transform: scale(1.15);
    stroke: #fff5c0;
    filter: drop-shadow(0 0 8px rgba(255,245,192,0.9));
}
.scroll-up { top: 120px; right: 20px; }
.scroll-down { bottom: 30px; right: 20px; }
@keyframes scrollPulse {
    0%, 100% { box-shadow: 0 0 15px rgba(212,175,55,0.5), 0 0 30px rgba(212,175,55,0.2); }
    50% { box-shadow: 0 0 25px rgba(212,175,55,0.8), 0 0 50px rgba(212,175,55,0.4), 0 0 70px rgba(212,175,55,0.2); }
}

/* BORDE DORADO RESPLANDECIENTE - DIVINO - TITILANTE */
.sacred-glow-border {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border: 3px solid transparent;
  border-radius: 16px;
  background: linear-gradient(45deg, #d4af37, #f4e2a1, #d4af37, #b8960c, #f4e2a1) border-box;
  -webkit-mask: 
    linear-gradient(#fff 0 0) padding-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: sacredPulse 3.2s ease-in-out infinite;
  box-shadow: 
    0 0 15px 4px rgba(212,175,55,0.7),
    0 0 35px 8px rgba(244,226,161,0.5),
    inset 0 0 25px rgba(212,175,55,0.4);
}

@keyframes sacredPulse {
  0%, 100% {
    opacity: 0.65;
    box-shadow: 
      0 0 15px 4px rgba(212,175,55,0.7),
      0 0 35px 8px rgba(244,226,161,0.5),
      inset 0 0 25px rgba(212,175,55,0.4);
  }
  50% {
    opacity: 1;
    box-shadow: 
      0 0 35px 12px rgba(212,175,55,1),
      0 0 70px 20px rgba(244,226,161,0.8),
      inset 0 0 45px rgba(212,175,55,0.7);
  }
}

.sacred-footer {
  position: relative;
  overflow: hidden;
  border-top: 3px solid transparent;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(10,20,40,0.8));
}

.sacred-footer::before {
  content: '';
  position: absolute;
  inset: -3px;
  border: 3px solid transparent;
  border-radius: 0 0 16px 16px;
  background: linear-gradient(90deg, #b8960c, #d4af37, #f4e2a1, #d4af37, #b8960c) border-box;
  -webkit-mask: 
    linear-gradient(#fff 0 0) padding-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: sacredPulse 4s ease-in-out infinite;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="cursor-cruz" id="cursor">
  <svg class="cruz-normal" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="cruzGold" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fff5c0"/>
        <stop offset="50%" stop-color="#d4af37"/>
        <stop offset="100%" stop-color="#8a7000"/>
      </linearGradient>
      <filter id="glowGold"><feGaussianBlur stdDeviation="2" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect x="18" y="4" width="4" height="32" rx="2" fill="url(#cruzGold)" filter="url(#glowGold)"/>
    <rect x="6" y="14" width="28" height="4" rx="2" fill="url(#cruzGold)" filter="url(#glowGold)"/>
    <circle cx="20" cy="10" r="2" fill="#fff5c0" filter="url(#glowGold)"/>
  </svg>
  <svg class="cruz-rayos" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="cruzRojo" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ff6666"/>
        <stop offset="50%" stop-color="#cc0000"/>
        <stop offset="100%" stop-color="#880000"/>
      </linearGradient>
      <linearGradient id="cruzAzul" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6699ff"/>
        <stop offset="50%" stop-color="#0044cc"/>
        <stop offset="100%" stop-color="#002266"/>
      </linearGradient>
      <filter id="glowRayos"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect x="18" y="4" width="4" height="32" rx="2" fill="url(#cruzRojo)" filter="url(#glowRayos)"/>
    <rect x="6" y="14" width="28" height="4" rx="2" fill="url(#cruzAzul)" filter="url(#glowRayos)"/>
    <circle cx="20" cy="10" r="2.5" fill="#ff8888" filter="url(#glowRayos)"/>
    <circle cx="20" cy="30" r="2" fill="#88bbff" filter="url(#glowRayos)"/>
  </svg>
</div>

<div class="login-container">
<div class="login-box">
<h1< class="reveal-rise">Panel de Administración</h1>
<input type="text" id="username" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<p class="error" id="errorMsg">Usuario o contraseña incorrectos</p>
</div>
</div>
<script>
const USUARIO = "Rayos";
const CONTRASEÑA = "Rufi14";

function login(){
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  const error = document.getElementById('errorMsg');

  if(user === USUARIO && pass === CONTRASEÑA){
    localStorage.setItem('adminLogged', 'true');
    window.location.href = 'admin_panel.html';
  }else{
    error.style.display = 'block';
  }
}

// Cursor script
const cursor = document.getElementById('cursor');
if(cursor){
  document.addEventListener('mousemove', function(e){
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.addEventListener('mouseover', function(e){
    cursor.classList.toggle('hover', !!e.target.closest('input,button'));
  });
}
</script>

<!-- Cursor Script -->
<script>
(function(){
  const cursor = document.getElementById('cursor');
  if(!cursor) return;
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.addEventListener('mouseover', e => {
    cursor.classList.toggle('hover', !!e.target.closest('a,button,[onclick],.btn,.scroll-btn'));
  });
})();
</script>


<script>
(function(){
  var hdr = document.getElementById('mainHeader');
  if(!hdr) return;
  window.addEventListener('scroll', function(){
    hdr.classList.toggle('scrolled', window.scrollY > 60);
  });
})();
</script>


<!-- Motion Design Bundle -->
<script src="js/splash.js"></script>
<script src="js/transitions.js"></script>
<script src="js/scroll-reveal.js"></script>
<script src="js/parallax.js"></script>
<script src="js/reading-progress.js"></script>
<script src="js/particles.js"></script>
</body>
</html>
