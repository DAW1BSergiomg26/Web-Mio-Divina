<style>

*{margin:0;padding:0;box-sizing:border-box}

<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';
import{ShaderPass}from'three/addons/postprocessing/ShaderPass.js';
import{GammaCorrectionShader}from'three/addons/shaders/GammaCorrectionShader.js';

const VERSES=[
{text:"El Señor es mi pastor, nada me faltará.",ref:"Salmo 23:1"},
{text:"Confía en Dios y Él te guiará.",ref:"Proverbios 3:5"},
{text:"La luz brilla en las tinieblas, y las tinieblas no la acogieron.",ref:"Juan 1:5"},

// ═══════════════════════════════════════════════════════════════════
// DEBUG SYSTEM
// ═══════════════════════════════════════════════════════════════════
class DebugSystem{
  constructor(app){
    this.app=app;this.panel=document.getElementById('debug-panel');this.errors=[];this.startTime=Date.now();
    this.log('🧪 DebugSystem iniciado','info');
  }
  log(msg,type='info'){
    const time=((Date.now()-this.startTime)/1000).toFixed(1);
    const line=document.createElement('div');
    line.className=type;line.textContent=`[${time}s] ${msg}`;
    this.panel.appendChild(line);
    if(type==='error'){this.errors.push(msg);console.error(msg);}
    else console.log(`[Debug] ${msg}`);
  }
  checkScene(){
    let ok=true;
    if(!this.app.scene){this.log('❌ scene no inicializada','error');ok=false;}
    if(!this.app.camera){this.log('❌ camera no inicializada','error');ok=false;}
    if(!this.app.renderer){this.log('❌ renderer no inicializado','error');ok=false;}
    if(ok)this.log('✅ Scene, camera, renderer OK','info');
    return ok;
  }
  checkLights(){
    const lights=this.app.scene?.children.filter(c=>c.isLight)||[];
    this.log(`💡 ${lights.length} luces activas`,'info');
  }
  show(){this.panel.classList.add('show');}
  hide(){this.panel.classList.remove('show');}
  reset(){
    this.log('🔄 Reiniciando Santuario...','warn');
    this.app.reset();
  }
}

// ═══════════════════════════════════════════════════════════════════
// CORE SYSTEM
// ═══════════════════════════════════════════════════════════════════
class CoreSystem{
  constructor(){
    this.clock=new THREE.Clock();this.mouse=new THREE.Vector2();this.raycaster=new THREE.Raycaster();
    this.clickables=[];this.init();this.setupEvents();
  }
  init(){
    this.renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
    this.renderer.setSize(window.innerWidth,window.innerHeight);
    this.renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    this.renderer.shadowMap.enabled=true;this.renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    this.renderer.outputColorSpace=THREE.LinearSRGBColorSpace;
    document.body.appendChild(this.renderer.domElement);
    this.scene=new THREE.Scene();
    this.scene.fog=new THREE.FogExp2(0x050810,.025);
    this.camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);
    this.camera.position.set(0,2.5,8);
    this.controls=new OrbitControls(this.camera,this.renderer.domElement);
    this.controls.target.set(0,1.8,0);
    this.controls.minDistance=3;this.controls.maxDistance=18;
    this.controls.maxPolarAngle=Math.PI*.8;this.controls.minPolarAngle=.1;
    this.controls.enableDamping=true;this.controls.dampingFactor=.06;
    this.controls.update();
    this.composer=new EffectComposer(this.renderer);
    this.composer.addPass(new RenderPass(this.scene,this.camera));
    this.bloomPass=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.2,.5,.15);
    this.composer.addPass(this.bloomPass);
    this.composer.addPass(new ShaderPass(GammaCorrectionShader));
  }
  setupEvents(){
    window.addEventListener('resize',()=>{
      this.camera.aspect=innerWidth/innerHeight;this.camera.updateProjectionMatrix();
      this.renderer.setSize(innerWidth,innerHeight);this.composer.setSize(innerWidth,innerHeight);
    });
    window.addEventListener('click',(e)=>{
      if(e.target.closest('.ui-panel'))return;
      this.mouse.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
      this.raycaster.setFromCamera(this.mouse,this.camera);
      const hits=this.raycaster.intersectObjects(this.clickables,true);
      if(hits.length)this.onObjectClick(hits[0].object,hits[0].point);
    });
  }
  onObjectClick(obj,pt){
    const type=obj.userData?.type;
    if(!type)return;
    if(type.startsWith('candle')){
      const idx=parseInt(type.split('_')[1]);
      this.app.candleSystem.toggleCandle(idx);
    }else if(type==='bible'){
      this.app.bibleSystem.showRandomVerse();
    }else if(type==='jesus'){
      this.app.crossSystem.flash();
      this.app.soundSystem.playBell();
    }
  }
  addClickable(mesh){this.clickables.push(mesh);}
}

// ═══════════════════════════════════════════════════════════════════
// LIGHT SYSTEM
// ═══════════════════════════════════════════════════════════════════
class LightSystem{
  constructor(scene){
    this.scene=scene;this.lights={};this.build();
  }
  build(){
    this.scene.add(new THREE.HemisphereLight(0x18102a,0x080820,.6));
    this.lights.divine=new THREE.DirectionalLight(0xffe8b0,2.5);
    this.lights.divine.position.set(0,12,5);
    this.lights.divine.castShadow=true;
    this.lights.divine.shadow.mapSize.setScalar(2048);
    this.scene.add(this.lights.divine);
    this.lights.rim=new THREE.PointLight(0x6040ff,1.8,15);
    this.lights.rim.position.set(0,5,-4);
    this.scene.add(this.lights.rim);
    this.lights.warm=new THREE.PointLight(0xff8030,.6,18);
    this.lights.warm.position.set(-6,4,4);
    this.scene.add(this.lights.warm);
    this.lights.cool=new THREE.PointLight(0x3060cc,.4,18);
    this.lights.cool.position.set(6,4,4);
    this.scene.add(this.lights.cool);
    this.lights.spot=new THREE.SpotLight(0xfff0c0,3,20,Math.PI/8,.3,1);
    this.lights.spot.position.set(0,10,2);
    this.lights.spot.target.position.set(0,1.5,0);
    this.scene.add(this.lights.spot,this.lights.spot.target);
  }
  update(T){
    this.lights.divine.intensity=2.5+Math.sin(T*.4)*.3;
    this.lights.rim.intensity=1.8+Math.sin(T*.6)*.5;
  }
}

// ═══════════════════════════════════════════════════════════════════
// CANDLE SYSTEM
// ═══════════════════════════════════════════════════════════════════
class CandleSystem{
  constructor(scene,core,app){
    this.scene=scene;this.core=core;this.app=app;this.candles=[];this.build();
  }
  build(){
    const positions=[[-1.5,0,.4],[-0.5,0,.5],[0.5,0,.5],[1.5,0,.4]];
    const waxMat=new THREE.MeshStandardMaterial({color:0xfffbe2,roughness:.9});
    const goldMat=new THREE.MeshStandardMaterial({color:0xd4a820,roughness:.1,metalness:.95,emissive:0x3a2000,.3});
    const flameMat=new THREE.MeshBasicMaterial({color:0xff8820,transparent:true,opacity:.95,blending:THREE.AdditiveBlending});
    positions.forEach((pos,i)=>{
      const g=new THREE.Group();
      const holder=new THREE.Mesh(new THREE.CylinderGeometry(.1,.14,.15,12),goldMat);
      holder.position.y=.075;g.add(holder);
      const body=new THREE.Mesh(new THREE.CylinderGeometry(.065,.075,1,12),waxMat);
      body.position.y=.65;body.castShadow=true;g.add(body);
      const flame=new THREE.Mesh(new THREE.SphereGeometry(.04,8,8),flameMat.clone());
      flame.scale.set(1,1.8,1);flame.position.y=1.25;g.add(flame);
      const light=new THREE.PointLight(0xff8020,1.2,4);
      light.position.y=1.3;g.add(light);
      g.position.set(...pos);
      g.userData={type:`candle_${i+1}`,flame,light,on:true,phase:Math.random()*Math.PI*2};
      body.userData=g.userData;
      this.core.addClickable(body);
      this.scene.add(g);
      this.candles.push(g);
    });
  }
  toggleCandle(idx){
    const c=this.candles[idx-1];if(!c)return;
    c.userData.on=!c.userData.on;
    const on=c.userData.on;
    c.userData.light.intensity=on?1.2:0;
    c.userData.flame.visible=on;
    document.getElementById(`btn-candle${idx}`).classList.toggle('active',on);
  }
  toggleAll(){
    const anyOn=this.candles.some(c=>c.userData.on);
    this.candles.forEach((c,i)=>{
      c.userData.on=!anyOn;
      c.userData.light.intensity=c.userData.on?1.2:0;
      c.userData.flame.visible=c.userData.on;
      document.getElementById(`btn-candle${i+1}`).classList.toggle('active',c.userData.on);
    });
    document.getElementById('btn-all').classList.toggle('active',!anyOn);
  }
  update(T){
    this.candles.forEach(c=>{
      if(!c.userData.on)return;
      const flicker=.75+.2*Math.sin(T*9.1*c.userData.phase)+.1*Math.sin(T*17*c.userData.phase)+.05*Math.random();
      c.userData.light.intensity=1.2*flicker;
      c.userData.flame.position.x=Math.sin(T*7+c.userData.phase)*.003;
      c.userData.flame.position.z=Math.cos(T*5+c.userData.phase)*.002;
    });
  }
}

// ═══════════════════════════════════════════════════════════════════
// SOUND SYSTEM
// ═══════════════════════════════════════════════════════════════════
class SoundSystem{
  constructor(){
    this.ctx=null;this.masterGain=null;this.musicOn=false;this.musicGain=null;
  }
  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.masterGain=this.ctx.createGain();
    this.masterGain.gain.value=.3;
    this.masterGain.connect(this.ctx.destination);
    this.createAmbientMusic();
  }
  createAmbientMusic(){
    this.musicGain=this.ctx.createGain();
    this.musicGain.gain.value=0;
    this.musicGain.connect(this.masterGain);
    const notes=[261.63,329.63,392,523.25,659.25];
    const playChord=()=>{
      if(!this.musicOn)return;
      notes.forEach((freq,i)==>{
        const osc=this.ctx.createOscillator();
        const env=this.ctx.createGain();
        osc.type='sine';osc.frequency.value=freq;
        env.gain.setValueAtTime(0,this.ctx.currentTime);
        env.gain.linearRampToValueAtTime(.08,this.ctx.currentTime+.5);
        env.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+4);
        osc.connect(env);env.connect(this.musicGain);
        osc.start();osc.stop(this.ctx.currentTime+4);
      });
      setTimeout(playChord,4000+Math.random()*2000);
    };
    this.playChordLoop=playChord;
  }
  toggleMusic(){
    if(!this.ctx)this.init();
    this.musicOn=!this.musicOn;
    if(this.musicOn){
      this.musicGain.gain.linearRampToValueAtTime(.25,this.ctx.currentTime+2);
      this.playChordLoop();
    }else{
      this.musicGain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+1);
    }
    document.getElementById('btn-music').classList.toggle('active',this.musicOn);
  }
  playBell(){
    if(!this.ctx)this.init();
    const freqs=[523.25,659.25,784,1046.5];
    freqs.forEach((f,i)=>{
      const osc=this.ctx.createOscillator();
      const env=this.ctx.createGain();
      osc.type='sine';osc.frequency.value=f;
      env.gain.setValueAtTime(.15,this.ctx.currentTime);
      env.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+2.5);
      osc.connect(env);env.connect(this.masterGain);
      osc.start(this.ctx.currentTime+i*.05);osc.stop(this.ctx.currentTime+2.5);
    });
  }
}

// ═══════════════════════════════════════════════════════════════════
// BIBLE SYSTEM
// ═══════════════════════════════════════════════════════════════════
class BibleSystem{
  constructor(scene,core,app){
    this.scene=scene;this.core=core;this.app=app;this.build();
  }
  build(){
    const g=new THREE.Group();
    const coverMat=new THREE.MeshStandardMaterial({color:0x4a1a08,roughness:.7,metalness:.1});
    const pageMat=new THREE.MeshStandardMaterial({color:0xeee8d8,roughness:.9});
    const goldMat=new THREE.MeshStandardMaterial({color:0xd4a820,roughness:.2,metalness:.9});
    const coverL=new THREE.Mesh(new THREE.BoxGeometry(.15,.8,.5),coverMat);
    coverL.position.set(-.35,0,0);g.add(coverL);
    const coverR=new THREE.Mesh(new THREE.BoxGeometry(.15,.8,.5),coverMat);
    coverR.position.set(.35,0,0);g.add(coverR);
    const coverT=new THREE.Mesh(new THREE.BoxGeometry(.85,.08,.55),coverMat);
    coverT.position.set(0,.42,0);g.add(coverT);
    for(let i=0;i<30;i++){
      const page=new THREE.Mesh(new THREE.BoxGeometry(.6,.005,.45),pageMat);
      page.position.set(0,.12+i*.003,0);
      page.rotation.y=(Math.random()-.5)*.02;
      g.add(page);
    }
    const cross=new THREE.Group();
    const v=new THREE.Mesh(new THREE.BoxGeometry(.03,.25,.03),goldMat);
    v.position.y=.12;cross.add(v);
    const h=new THREE.Mesh(new THREE.BoxGeometry(.15,.03,.03),goldMat);
    h.position.y=.2;cross.add(h);
    cross.position.set(0,.35,.28);
    g.add(cross);
    g.position.set(2.2,1.3,.2);
    g.rotation.y=-.4;
    g.userData={type:'bible'};
    this.core.addClickable(g);
    this.scene.add(g);
    this.mesh=g;
    const light=new THREE.PointLight(0xffd080,.8,3);
    light.position.copy(g.position);
    light.position.y+=.5;
    this.scene.add(light);
    this.light=light;
  }
  showRandomVerse(){
    const v=VERSES[Math.floor(Math.random()*VERSES.length)];
    const disp=document.getElementById('verse-display');
    disp.querySelector('.verse-text').textContent=v.text;
    disp.querySelector('.verse-ref').textContent=v.ref;
    disp.classList.add('show');
    this.light.intensity=2;
    setTimeout(()=>{disp.classList.remove('show');this.light.intensity=.8;},6000);
  }
  update(T){
    this.light.intensity=.8+Math.sin(T*.5)*.2;
  }
}

// ═══════════════════════════════════════════════════════════════════
// CROSS SYSTEM (JESÚS AAA)
// ═══════════════════════════════════════════════════════════════════
class CrossSystem{
  constructor(scene,core,app){
    this.scene=scene;this.core=core;this.app=app;this.build();
  }
  build(){
    const g=new THREE.Group();
    const woodMat=new THREE.MeshStandardMaterial({color:0x5a3a1a,roughness:.85,metalness:.05});
    const skinMat=new THREE.MeshStandardMaterial({color:0xcca080,roughness:.8});
    const clothMat=new THREE.MeshStandardMaterial({color:0xeee0c8,roughness:.6});
    const goldMat=new THREE.MeshStandardMaterial({color:0xd4a820,roughness:.2,metalness:.9});
    const thornMat=new THREE.MeshStandardMaterial({color:0x3a2a10,roughness:.95});
    const bloodMat=new THREE.MeshStandardMaterial({color:0x8b0a0a,roughness:.7});
    const vb=new THREE.Mesh(new THREE.BoxGeometry(.28,4.5,.28),woodMat);
    vb.position.y=2.25;vb.castShadow=true;g.add(vb);
    const hb=new THREE.Mesh(new THREE.BoxGeometry(2.8,.25,.25),woodMat);
    hb.position.y=3.8;hb.castShadow=true;g.add(hb);
    const body=new THREE.Mesh(new THREE.CylinderGeometry(.1,.09,.7,10),skinMat);
    body.position.set(0,2.8,.18);body.rotation.z=.1;g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.16,14,14),skinMat);
    head.position.set(0,4.05,.18);g.add(head);
    [-1,1].forEach(side=>{
      const arm=new THREE.Mesh(new THREE.CylinderGeometry(.05,.04,.9,8),skinMat);
      arm.position.set(side*.55,3.2,.18);arm.rotation.z=side*(-Math.PI/2+.25);g.add(arm);
      const leg=new THREE.Mesh(new THREE.CylinderGeometry(.055,.045,.55,8),skinMat);
      leg.position.set(side*.08,1.85,.18);leg.rotation.z=side*.08;g.add(leg);
    });
    const loin=new THREE.Mesh(new THREE.BoxGeometry(.32,.28,.05),clothMat);
    loin.position.set(0,2.2,.22);g.add(loin);
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2;
      const thorn=new THREE.Mesh(new THREE.ConeGeometry(.015,.08,5),thornMat);
      thorn.position.set(Math.cos(a)*.18,4.15,Math.sin(a)*.18+.18);
      thorn.rotation.z=Math.PI/6;thorn.rotation.y=a;g.add(thorn);
    }
    const woundL=new THREE.Mesh(new THREE.SphereGeometry(.02,6,6),bloodMat);
    woundL.position.set(-.55,3.2,.18);g.add(woundL);
    const woundR=new THREE.Mesh(new THREE.SphereGeometry(.02,6,6),bloodMat);
    woundR.position.set(.55,3.2,.18);g.add(woundR);
    const woundF=new THREE.Mesh(new THREE.SphereGeometry(.025,6,6),bloodMat);
    woundF.position.set(0,1.85,.18);g.add(woundF);
    const nailL=new THREE.Mesh(new THREE.CylinderGeometry(.015,.015,.12,6),goldMat);
    nailL.position.set(-1.4,3.2,.18);nailL.rotation.z=Math.PI/2;g.add(nailL);
    const nailR=new THREE.Mesh(new THREE.CylinderGeometry(.015,.015,.12,6),goldMat);
    nailR.position.set(1.4,3.2,.18);nailR.rotation.z=Math.PI/2;g.add(nailR);
    const nailF=new THREE.Mesh(new THREE.CylinderGeometry(.015,.015,.12,6),goldMat);
    nailF.position.set(0,1.5,.18);g.add(nailF);
    const inri=new THREE.Mesh(new THREE.BoxGeometry(.7,.18,.04),goldMat);
    inri.position.set(0,4.55,.18);g.add(inri);
    const haloMat=new THREE.MeshBasicMaterial({color:0xfff8d0,transparent:true,opacity:.15,blending:THREE.AdditiveBlending});
    const halo=new THREE.Mesh(new THREE.SphereGeometry(.6,24,24),haloMat);
    halo.position.set(0,4.4,-.3);g.add(halo);
    this.halo=halo;
    g.position.set(0,1.2,-2.5);
    g.userData={type:'jesus'};
    this.core.addClickable(vb);
    this.scene.add(g);
    this.group=g;
    const divineLight=new THREE.PointLight(0xffe8b0,2,6);
    divineLight.position.set(0,4,-2);
    this.scene.add(divineLight);
    this.divineLight=divineLight;
  }
  flash(){
    const orig=this.bloomPass?.strength||1.2;
    const origHalo=this.halo.material.opacity;
    let t=0;
    const tick=()=>{
      t+=.04;if(t>1)return;
      if(this.app.composer){
        this.app.bloomPass.strength=orig+Math.sin(t*Math.PI)*1.5;
      }
      this.halo.material.opacity=origHalo+Math.sin(t*Math.PI)*.2;
      requestAnimationFrame(tick);
    };
    tick();
  }
  update(T,breath){
    this.group.position.y=1.2+breath*.02;
    this.divineLight.intensity=2+Math.sin(T*.5)*.3;
    this.halo.material.opacity=.15+Math.sin(T*.4)*.05;
  }
}

// ═══════════════════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════════
class ParticleSystem{
  constructor(scene){
    this.scene=scene;this.build();
  }
  build(){
    const count=300;
    const pos=new Float32Array(count*3);
    const speeds=new Float32Array(count);
    for(let i=0;i<count;i++){
      const a=Math.random()*Math.PI*2,r=1+Math.random()*5;
      pos[i*3]=Math.cos(a)*r;
      pos[i*3+1]=Math.random()*10;
      pos[i*3+2]=Math.sin(a)*r-2;
      speeds[i]=.005+Math.random()*.01;
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.userData={speeds,count};
    const mat=new THREE.PointsMaterial({color:0xffdd88,size:.06,transparent:true,opacity:.6,blending:THREE.AdditiveBlending,depthWrite:false});
    this.particles=new THREE.Points(geo,mat);
    this.scene.add(this.particles);
    const godRayMat=new THREE.MeshBasicMaterial({color:0xfff8d0,transparent:true,opacity:.03,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending});
    this.godRays=[];
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*.4-.3*Math.PI;
      const ray=new THREE.Mesh(new THREE.ConeGeometry(3,12,4,1,true),godRayMat.clone());
      ray.position.set(Math.sin(a)*2,10,-1);
      ray.rotation.x=Math.PI;ray.rotation.y=a;
      this.scene.add(ray);
      this.godRays.push(ray);
    }
  }
  update(T){
    const pos=this.particles.geometry.attributes.position;
    const speeds=this.particles.geometry.userData.speeds;
    const count=this.particles.geometry.userData.count;
    for(let i=0;i<count;i++){
      pos.array[i*3+1]+=speeds[i];
      if(pos.array[i*3+1]>10)pos.array[i*3+1]=0;
      pos.array[i*3]+=Math.sin(T*.5+i)*.001;
    }
    pos.needsUpdate=true;
    this.particles.material.opacity=.5+Math.sin(T*.4)*.15;
    this.godRays.forEach((ray,i)=>{
      ray.material.opacity=.02+Math.sin(T*.3+i)*.015;
    });
  }
}

// ═══════════════════════════════════════════════════════════════════
// ENVIRONMENT (Floor, Altar, etc)
// ═══════════════════════════════════════════════════════════════════
class EnvironmentSystem{
  constructor(scene){
    this.scene=scene;this.build();
  }
  build(){
    const floorMat=new THREE.MeshStandardMaterial({color:0x2a2018,roughness:.7});
    const floor=new THREE.Mesh(new THREE.PlaneGeometry(30,20),floorMat);
    floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;this.scene.add(floor);
    const wallMat=new THREE.MeshStandardMaterial({color:0x1a1510,roughness:.95});
    const wall=new THREE.Mesh(new THREE.PlaneGeometry(20,12),wallMat);
    wall.position.set(0,6,-5);this.scene.add(wall);
    const altarMat=new THREE.MeshStandardMaterial({color:0x4a3a28,roughness:.4,metalness:.1});
    const altarBase=new THREE.Mesh(new THREE.BoxGeometry(4,.9,1.2),altarMat);
    altarBase.position.set(0,.45,0);altarBase.castShadow=true;altarBase.receiveShadow=true;this.scene.add(altarBase);
    const altarTop=new THREE.Mesh(new THREE.BoxGeometry(4.2,.1,1.4),altarMat);
    altarTop.position.set(0,1,.05);this.scene.add(altarTop);
  }
}

// ═══════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════
class SanctuaryApp{
  constructor(){
    this.core=new CoreSystem();
    this.scene=this.core.scene;
    this.camera=this.core.camera;
    this.renderer=this.core.renderer;
    this.composer=this.core.composer;
    this.bloomPass=this.core.bloomPass;
    this.debugSystem=new DebugSystem(this);
    this.lightSystem=new LightSystem(this.scene);
    this.envSystem=new EnvironmentSystem(this.scene);
    this.candleSystem=new CandleSystem(this.scene,this.core,this);
    this.soundSystem=new SoundSystem();
    this.bibleSystem=new BibleSystem(this.scene,this.core,this);
    this.crossSystem=new CrossSystem(this.scene,this.core,this);
    this.particleSystem=new ParticleSystem(this.scene);
    this.debugSystem.checkScene();
    this.debugSystem.checkLights();
    this.loadingDone();
    this.loop();
  }
  loadingDone(){
    setTimeout(()=>{
      document.getElementById('loading').classList.add('gone');
      setTimeout(()=>{
        document.getElementById('hint').classList.add('show');
        setTimeout(()=>document.getElementById('hint').classList.remove('show'),5000);
      },1500);
    },1500);
  }
  loop(){
    requestAnimationFrame(()=>this.loop());
    const T=this.core.clock.getElapsedTime();
    const breath=Math.sin(T*.8);
    this.core.controls.update();
    this.lightSystem.update(T);
    this.candleSystem.update(T);
    this.bibleSystem.update(T);
    this.crossSystem.update(T,breath);
    this.particleSystem.update(T);
    this.composer.render();
  }
  reset(){
    location.reload();
  }
}

const app=new SanctuaryApp();
window.app=app;
</script>
